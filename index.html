<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Huixin Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="/src/assets/images/idea-coding-round.svg" />
    <script>
      (() => {
        const storageKey = "theme";
        const light = "light";
        const dracula = "dracula";

        try {
          const storedTheme = localStorage.getItem(storageKey);
          const theme =
            storedTheme === light || storedTheme === dracula
              ? storedTheme
              : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
              ? dracula
              : light;

          document.documentElement.classList.toggle("dark", theme === dracula);
          document.documentElement.style.colorScheme = theme === dracula ? "dark" : "light";
          document.documentElement.dataset.theme = theme;
        } catch {
          document.documentElement.classList.remove("dark");
          document.documentElement.style.colorScheme = "light";
          document.documentElement.dataset.theme = light;
        }
      })();
    </script>
  </head>
